<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAPI Calling App</title>
    <style>
        .filter-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 8px 16px;
            border: 1px solid #dee2e6;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .filter-btn:hover {
            background: #f8f9fa;
        }
        .filter-btn.active {
            background: #007cba;
            color: white;
            border-color: #007cba;
        }
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 50px auto;
            padding: 20px;
        }
        .upload-container {
            border: 2px dashed #ccc;
            padding: 40px;
            text-align: center;
            margin: 20px 0;
        }
        .time-settings {
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
        }
        .time-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 10px 0;
            flex-wrap: wrap;
        }
        .time-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        select {
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        button {
            background-color: #007cba;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin: 5px;
        }
        button:hover {
            background-color: #005a8a;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        .cancel-btn {
            background-color: #dc3545;
        }
        .cancel-btn:hover {
            background-color: #c82333;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
        }
        .success {
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        .error {
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        .info {
            background-color: #d1ecf1;
            border: 1px solid #bee5eb;
            color: #0c5460;
        }
        
        /* Status Display Styles */
        .status-container {
            margin-top: 30px;
            display: none;
        }
        .status-summary {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .status-card {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            min-width: 120px;
        }
        .status-card h4 {
            margin: 0 0 10px 0;
            color: #495057;
        }
        .status-number {
            font-size: 24px;
            font-weight: bold;
            color: #007cba;
        }
        .calls-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        .calls-table th, .calls-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #dee2e6;
        }
        .calls-table th {
            background-color: #f8f9fa;
            font-weight: bold;
        }
        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        .status-scheduled { background-color: #fff3cd; color: #856404; }
        .status-calling { background-color: #cce5ff; color: #004085; }
        .status-completed { background-color: #d4edda; color: #155724; }
        .status-failed { background-color: #f8d7da; color: #721c24; }
        
        .progress-bar {
            width: 100%;
            height: 20px;
            background-color: #e9ecef;
            border-radius: 10px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill {
            height: 100%;
            background-color: #007cba;
            transition: width 0.3s ease;
        }
    </style>
</head>

    <div id="result"></div>
    
    <!-- Status Display Container -->
    <div id="statusContainer" class="status-container">
        <h3>📊 Call Status Dashboard</h3>

        <div class="filter-buttons" style="margin-bottom: 15px;">
    <button type="button" onclick="filterCalls('all')" class="filter-btn active" id="filter-all">All Calls</button>
    <button type="button" onclick="filterCalls('completed')" class="filter-btn" id="filter-completed">Completed</button>
    <button type="button" onclick="filterCalls('failed')" class="filter-btn" id="filter-failed">Failed</button>
    <button type="button" onclick="filterCalls('scheduled')" class="filter-btn" id="filter-scheduled">Scheduled</button>
</div>
        
        <div class="status-summary">
            <div class="status-card">
                <h4>Total</h4>
                <div class="status-number" id="totalCalls">0</div>
            </div>
            <div class="status-card">
                <h4>Completed</h4>
                <div class="status-number" id="completedCalls">0</div>
            </div>
            <div class="status-card">
                <h4>Active</h4>
                <div class="status-number" id="activeCalls">0</div>
            </div>
            <div class="status-card">
                <h4>Scheduled</h4>
                <div class="status-number" id="scheduledCalls">0</div>
            </div>
        </div>

            <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
        </div>
        <p id="progressText">0% complete</p>
        
        <table class="calls-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Status</th>
                    <th>Scheduled Time</th>
                    <th>Message</th>
                </tr>
            </thead>
            <tbody id="callsTableBody">
            </tbody>
        </table>
    </div>

    <script>
        let statusUpdateInterval = null;
        
        // Update time window info when times change
        function updateTimeInfo() {
            const startTime = document.getElementById('startTime').value;
            const endTime = document.getElementById('endTime').value;
            const timeInfo = document.getElementById('timeInfo');
            
            const start = new Date(`2024-01-01 ${startTime}`);
            const end = new Date(`2024-01-01 ${endTime}`);
            
            if (end <= start) {
                timeInfo.innerHTML = '⚠️ End time must be after start time';
                timeInfo.className = 'error';
                timeInfo.style.display = 'block';
                return false;
            }
            
            const durationHours = (end - start) / (1000 * 60 * 60);
            timeInfo.innerHTML = `✅ Calling window: ${durationHours} hours (${startTime} to ${endTime})`;
            timeInfo.className = 'info';
            timeInfo.style.display = 'block';
            return true;
        }
        
        // Add event listeners for time changes
        document.getElementById('startTime').addEventListener('change', updateTimeInfo);
        document.getElementById('endTime').addEventListener('change', updateTimeInfo);
        
        // Initialize time info
        updateTimeInfo();

        // Function to update call status display
        async function updateCallStatus() {
            try {
                const response = await fetch('/status');
                const data = await response.json();
                
                // Update summary cards
                document.getElementById('totalCalls').textContent = data.summary.total;
                document.getElementById('completedCalls').textContent = data.summary.completed;
                document.getElementById('activeCalls').textContent = data.summary.active;
                document.getElementById('scheduledCalls').textContent = data.summary.scheduled;
                
                // Update progress bar
                const progress = data.summary.total > 0 ? (data.summary.completed / data.summary.total) * 100 : 0;
                document.getElementById('progressFill').style.width = `${progress}%`;
                document.getElementById('progressText').textContent = `${Math.round(progress)}% complete (${data.summary.completed}/${data.summary.total})`;
                
               // Update table
const tableBody = document.getElementById('callsTableBody');
tableBody.innerHTML = '';

data.calls.forEach((call, index) => {
    if (call) {
        const row = document.createElement('tr');

        // Apply current filter
const rows = tableBody.querySelectorAll('tr');
rows.forEach(row => {
    const statusBadge = row.querySelector('.status-badge');
    if (statusBadge) {
        const isVisible = currentFilter === 'all' || 
                         (currentFilter === 'completed' && statusBadge.textContent.includes('✅')) ||
                         (currentFilter === 'failed' && statusBadge.textContent.includes('❌')) ||
                         (currentFilter === 'scheduled' && statusBadge.textContent.includes('⏰'));
        
        row.style.display = isVisible ? '' : 'none';
    }
});
        
        // Determine status display
        let statusClass, statusText;
        if (call.status === 'completed') {
            if (call.success) {
                statusClass = 'status-completed';
                statusText = '✅ Completed';
            } else {
                statusClass = 'status-failed';
                statusText = '❌ Failed';
            }
        } else if (call.status === 'scheduled') {
            statusClass = 'status-scheduled';
            statusText = '⏰ Scheduled';
        } else {
            statusClass = 'status-calling';
            statusText = '📞 Calling';
        }
        
        // Format scheduled time
        let scheduledTime = '-';
        if (call.scheduledTimeLocal) {
            scheduledTime = call.scheduledTimeLocal;
        } else if (call.scheduledTime) {
            const date = new Date(call.scheduledTime);
            scheduledTime = date.toLocaleTimeString();
        } else if (call.message && call.message.includes('Scheduled for')) {
            const timeMatch = call.message.match(/Scheduled for (.+)/);
            if (timeMatch) {
                scheduledTime = timeMatch[1];
            }
        }
        
        // Build detailed message with outcome data
        let detailedMessage = call.message || '-';
        if (call.status === 'completed' && call.outcomeReceived) {
            let outcomeDetails = [];
            if (call.endedReason) outcomeDetails.push(`Reason: ${call.endedReason}`);
            if (call.duration) outcomeDetails.push(`Duration: ${Math.round(call.duration)}s`);
            if (call.cost) outcomeDetails.push(`Cost: $${call.cost.toFixed(4)}`);
            if (call.successEvaluation) outcomeDetails.push(`Result: ${call.successEvaluation}`);
            
            if (outcomeDetails.length > 0) {
                detailedMessage = outcomeDetails.join(' | ');
            }
        }
        
        row.innerHTML = `
            <td>${index + 1}</td>
            <td>${call.contact.name}</td>
            <td>${call.contact.phone}</td>
            <td><span class="status-badge ${statusClass}">${statusText}</span></td>
            <td>${scheduledTime}</td>
            <td>${detailedMessage}</td>
        `;
        
        tableBody.appendChild(row);
    }
});
                
            } catch (error) {
                console.error('Error updating status:', error);
            }
        }
        
        // Start status updates
        function startStatusUpdates() {
            updateCallStatus(); // Update immediately
            statusUpdateInterval = setInterval(updateCallStatus, 2000); // Update every 2 seconds
        }
        
        // Stop status updates
        function stopStatusUpdates() {
            if (statusUpdateInterval) {
                clearInterval(statusUpdateInterval);
                statusUpdateInterval = null;
            }
        }

        document.getElementById('uploadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const fileInput = document.getElementById('csvFile');
            const submitBtn = document.getElementById('submitBtn');
            const cancelBtn = document.getElementById('cancelBtn');
            const resultDiv = document.getElementById('result');
            const statusContainer = document.getElementById('statusContainer');
            const startTime = document.getElementById('startTime').value;
            const endTime = document.getElementById('endTime').value;
            
            if (!fileInput.files[0]) {
                resultDiv.innerHTML = '<div class="error">Please select a CSV file.</div>';
                return;
            }
            
            if (!updateTimeInfo()) {
                resultDiv.innerHTML = '<div class="error">Please set a valid time window.</div>';
                return;
            }
            
            // Disable button and show loading
            submitBtn.disabled = true;
            submitBtn.textContent = 'Processing...';
            resultDiv.innerHTML = '<div>Uploading file and scheduling calls...</div>';
            
            // Create FormData and upload
            const formData = new FormData();
            formData.append('csvFile', fileInput.files[0]);
            formData.append('startTime', startTime);
            formData.append('endTime', endTime);
            
            try {
                const response = await fetch('/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    resultDiv.innerHTML = `
                        <div class="success">
                            <strong>${result.message}</strong><br>
                            Scheduled ${result.totalContacts} calls between ${startTime} and ${endTime}<br>
                            Calling window: ${result.windowHours} hours, ${result.intervalMinutes} minutes between calls
                        </div>
                    `;
                    
                    // Show status container and cancel button
                    statusContainer.style.display = 'block';
                    cancelBtn.style.display = 'inline-block';
                    
                    // Start real-time status updates
                    startStatusUpdates();
                    
                } else {
                    resultDiv.innerHTML = `<div class="error">Error: ${result.error}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">Error uploading file: ${error.message}</div>`;
            }
            
            // Re-enable button
            submitBtn.disabled = false;
            submitBtn.textContent = 'Upload and Schedule Calls';
        });
        
        // Cancel calls functionality
        document.getElementById('cancelBtn').addEventListener('click', async function() {
            const cancelBtn = document.getElementById('cancelBtn');
            const resultDiv = document.getElementById('result');
            
            cancelBtn.disabled = true;
            cancelBtn.textContent = 'Cancelling...';
            
            try {
                const response = await fetch('/cancel-calls', { method: 'POST' });
                const result = await response.json();
                
                if (response.ok) {
                    resultDiv.innerHTML = `<div class="info">${result.message}</div>`;
                    cancelBtn.style.display = 'none';
                    stopStatusUpdates();
                } else {
                    resultDiv.innerHTML = `<div class="error">Error: ${result.error}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">Error cancelling calls: ${error.message}</div>`;
            }
            
            cancelBtn.disabled = false;
            cancelBtn.textContent = 'Cancel All Calls';
        });

        let currentFilter = 'all';

        function filterCalls(filter) {
            currentFilter = filter;
            
            // Update active button
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`filter-${filter}`).classList.add('active');
            
            // Filter will be applied on next status update
            updateCallStatus();
        }
    </script>
</body>
</html>
